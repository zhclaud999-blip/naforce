<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaForce - AI Blog Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary: #00ff88;
      --bg: #0a0a0a;
      --bg2: #111;
      --text: #eee;
      --text2: #888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: var(--primary);
      font-weight: 300;
      letter-spacing: 4px;
    }
    .card {
      background: var(--bg2);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text2);
      font-size: 14px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: var(--text);
      font-size: 16px;
      margin-bottom: 16px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    button {
      background: var(--primary);
      color: #000;
      border: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.02); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-group { display: flex; gap: 12px; }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }
    #result {
      min-height: 200px;
      white-space: pre-wrap;
      line-height: 1.8;
    }
    #result h1, #result h2, #result h3 {
      margin: 1em 0 0.5em;
      color: var(--primary);
    }
    #result p { margin-bottom: 1em; }
    .loading {
      text-align: center;
      color: var(--text2);
      padding: 40px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ NaForce</h1>
    
    <div class="card">
      <label>选择模型</label>
      <select id="model">
        <option value="deepseek">DeepSeek (推荐)</option>
        <option value="openai">OpenAI GPT-3.5</option>
        <option value="anthropic">Claude 3</option>
      </select>
      
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="输入你的 API Key">
      
      <label>文章标题</label>
      <input type="text" id="title" placeholder="输入文章标题，如：如何学会游泳">
      
      <button id="generateBtn" onclick="generate()">✨ 生成文章</button>
    </div>
    
    <div class="card hidden" id="resultCard">
      <div class="btn-group" style="margin-bottom: 16px;">
        <button class="btn-outline" onclick="copy()">📋 复制</button>
        <button class="btn-outline" onclick="download()">📥 下载</button>
      </div>
      <div id="result"></div>
    </div>
  </div>

  <script>
    // 从本地存储加载 API Key
    const savedKey = localStorage.getItem('naforce_apiKey');
    if (savedKey) document.getElementById('apiKey').value = savedKey;
    
    const savedModel = localStorage.getItem('naforce_model');
    if (savedModel) document.getElementById('model').value = savedModel;

    async function generate() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const title = document.getElementById('title').value.trim();
      const model = document.getElementById('model').value;
      const btn = document.getElementById('generateBtn');
      const resultCard = document.getElementById('resultCard');
      const result = document.getElementById('result');

      if (!apiKey || !title) {
        alert('请填写 API Key 和标题');
        return;
      }

      // 保存到本地
      localStorage.setItem('naforce_apiKey', apiKey);
      localStorage.setItem('naforce_model', model);

      btn.disabled = true;
      btn.textContent = '⏳ 生成中...';
      resultCard.classList.add('hidden');
      result.innerHTML = '<div class="loading">AI 正在写作中...</div>';

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, apiKey, model })
        });

        const data = await res.json();

        if (data.error) {
          result.innerHTML = '<div style="color: #ff4444;">错误: ' + data.error + '</div>';
        } else {
          // 用 marked 渲染 markdown
          result.innerHTML = marked.parse(data.content);
        }
        
        resultCard.classList.remove('hidden');
      } catch (e) {
        result.innerHTML = '<div style="color: #ff4444;">请求失败: ' + e.message + '</div>';
        resultCard.classList.remove('hidden');
      }

      btn.disabled = false;
      btn.textContent = '✨ 生成文章';
    }

    function copy() {
      const text = document.getElementById('result').innerText;
      navigator.clipboard.writeText(text);
      alert('已复制到剪贴板');
    }

    function download() {
      const text = document.getElementById('result').innerText;
      const title = document.getElementById('title').value;
      const blob = new Blob([text], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (title || 'article') + '.md';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
